<!doctype html>
<html lang="en">
  <head>
    <title>JavaJam Coffee House</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- Main Header -->
    <header id="header">
      <h1>JavaJam Coffee House</h1>
    </header>
    <!-- Main Sidebar -->
    <aside id="sidebar">
      <div id="links-section">
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Music</a>
        <a href="#">Jobs</a>
      </div>
    </aside>
    <!-- Main Section -->
    <section id="main-section">
      <article class="content-section">
        <h2>Jobs At JavaJam</h2> <br>
        <p>
          Want to work at JavaJam? Fill out the form below to start your
          application. Required fields are marked with an asterisk *
        </p>
      </article>
      <article class="content-section">
        <form>
          <table>
            <tr>
              <td><label class="bold-label">*Name:</label></td>
              <td><input type="text" /></td>
            </tr>
            <tr>
              <td><label class="bold-label">*Email:</label></td>
              <td><input type="email" /></td>
            </tr>
            <tr>
              <td><label class="bold-label">Start Date:</label></td>
              <td><input type="date" /></td>
            </tr>
            <tr>
              <td><label class="bold-label">*Experience:</label></td>
              <td><textarea rows="2" cols="23"></textarea></td>
            </tr>
            <tr>
              <td>
                <input type="submit" value="Apply Now" />
              </td>
            </tr>
          </table>
        </form>
      </article>
    </section>

    <footer>
      <h2>Copyrights &copy; 2026 JavaJam Coffee House</h2>
      <p>All Rights Are Reserved &reg;</p>
      <small>Developed & Maintained By <a href="#">Ashwin</a></small>
    </footer>
  </body>
</html>
