<!doctype html>
<html lang="en">
  <head>
    <title>Amart</title>
    <style>
      * {
        margin: 0px;
      }
      #navbar > h1 {
        background-color: rgb(226, 21, 213);
        color: rgba(4, 32, 240, 0.959);
      }
      #item-section {
        border: 2px solid lime;
      }
      #item-section:hover {
        cursor: pointer;
        box-shadow: 2px 0px lightsalmon;
      }
      #item-section {
        width: 200px;
        height: 280px;
        margin-top: 5px;
        border-radius: 10px;
        display: inline-block;
        margin-left: 7px;
      }
      #item-section > img {
        height: 180px;
        border-radius: 9px;
        width: inherit;
      }
      .items-details {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="navbar">
      <h1>🛒Amart</h1>
    </div>
    <section style="margin-bottom: 20px">
      <div id="item-section">
        <img src="../css/pineapple.webp" alt="" />
        <div class="items-details">
          <h2>PineApple</h2>
          <h3>&#8377; 120.00</h3>
          <h3>⭐5.0</h3>
        </div>
      </div>

      <div id="item-section">
        <img src="../css/banana.jpg" alt="" />
        <div class="items-details">
          <h2>Banana</h2>
          <h3>&#8377; 60.00</h3>
          <h3>⭐4.3</h3>
        </div>
      </div>

      <div id="item-section">
        <img src="../css/avacado.avif" alt="" />
        <div class="items-details">
          <h2>Avacado</h2>
          <h3>&#8377; 60.00</h3>
          <h3>⭐4.8</h3>
        </div>
      </div>

      <div id="item-section">
        <img src="../css/orange.avif" alt="" />
        <div class="items-details">
          <h2>Orange</h2>
          <h3>&#8377; 140.00</h3>
          <h3>⭐4.3</h3>
        </div>
      </div>

      <div id="item-section">
        <img src="../css/mango.jpg" alt="" />
        <div class="items-details">
          <h2>Mango</h2>
          <h3>&#8377; 100.00</h3>
          <h3>⭐3.8</h3>
        </div>
      </div>
    </section>
  </body>
</html>
