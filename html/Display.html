<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Property</title>
    <style>
      h1 {
        background-color: lightgray;
        color: black;
        display: block;
        width: 300px;
      }
      a {
        background-color: yellow;
        color: red;
        display: inline;
        width: 100px;
      }
    </style>
  </head>
  <body>
    <h1>Sample Header</h1>
    <h1>Sample Header</h1>
    <a href="#">Click Me</a>
    <i>Click Here</i>
    <span>Click Here</span>
  </body>
</html>
