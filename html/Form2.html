<!doctype html>
<html>
  <head>
    <title>Form Tag</title>
  </head>
  <body>
    <h1>HTML FORMS - 2</h1>
    <form>
      <fieldset>
        <legend>LogIn Here</legend>

        <table>
          <tbody><tr>
            <td>
              <label>UserName</label>
              <input type="text" />
            </td>
          </tr>
          <tr>
            <td>
              <label>Password</label>
              <input type="password" />
            </td>
          </tr>
          <tr>
            <td colspan="2" align="center">
              <input type="submit" value="LogIn" />
            </td>
          </tr>
          </tbody>
        </table>
      </fieldset>
    </form>


    
  </body>
</html>
