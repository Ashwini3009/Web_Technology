<!doctype html>
<html>
  <head>
    <title>Table Tag - 2</title>
  </head>
  <body>
    <table border="2px" cellpadding="5px" cellspacing="2px">
      <thead>
        <tr>
          <th>Day</th>
          <th>Meal</th>
          <th colspan="2">Items</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td rowspan="2">Monday</td>
          <td>Breakfast</td>
          <td>Toast</td>
          <td>Coffee</td>
        </tr>
        <tr>
          <td>Lunch</td>
          <td>Sandwich</td>
          <td>Tea</td>
        </tr>
        <tr>
          <td rowspan="2">Tuesday</td>
          <td>Breakfast</td>
          <td>Pancakes</td>
          <td>Milk</td>
        </tr>
        <tr>
          <td>Lunch</td>
          <td>Salad</td>
          <td>Juice</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
